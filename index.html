<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a3a2a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="The Bag">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>The Bag</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1a3a2a;--green-mid:#2d5a3d;--green-light:#e8f0eb;
  --gold:#c9a84c;--gold-light:#f9f1dc;--cream:#faf8f4;
  --text:#1a1a1a;--text-muted:#6b7280;--border:#e2ddd5;
  --white:#ffffff;--danger:#dc2626;
}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);max-width:430px;margin:0 auto;min-height:100vh;padding-top:env(safe-area-inset-top);}
.header{background:var(--green);padding:1.25rem 1.25rem 0;position:sticky;top:0;z-index:100;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.logo{font-family:'Playfair Display',serif;font-size:22px;color:var(--cream);font-weight:600;letter-spacing:0.02em;}
.logo span{color:var(--gold);}
.add-btn{background:var(--gold);border:none;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--green);font-size:20px;transition:transform 0.15s;flex-shrink:0;}
.add-btn:active{transform:scale(0.95);}
.tabs{display:flex;}
.tab{flex:1;padding:0.6rem 0;font-size:14px;font-weight:500;text-align:center;border:none;background:transparent;color:rgba(255,255,255,0.5);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;font-family:'DM Sans',sans-serif;}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.content{padding:1rem 1rem 5rem;}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:1rem;}
.stat-card{background:var(--white);border:0.5px solid var(--border);border-radius:10px;padding:0.65rem 0.75rem;text-align:center;}
.stat-num{font-size:22px;font-weight:600;color:var(--green);font-family:'Playfair Display',serif;}
.stat-label{font-size:11px;color:var(--text-muted);margin-top:2px;}
.section-head{font-size:12px;font-weight:500;color:var(--text-muted);letter-spacing:0.06em;text-transform:uppercase;margin:0.75rem 0 0.5rem;}
.course-card{background:var(--white);border:0.5px solid var(--border);border-radius:12px;padding:1rem;margin-bottom:0.65rem;cursor:pointer;transition:border-color 0.15s;}
.course-card:active{border-color:#b5b0a8;background:#f5f3ef;}
.course-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.course-name{font-weight:500;font-size:15px;line-height:1.3;}
.course-location{font-size:12px;color:var(--text-muted);margin-top:2px;}
.course-meta{font-size:12px;color:var(--text-muted);margin-top:6px;}
.course-notes{font-size:13px;color:var(--text-muted);margin-top:5px;font-style:italic;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.rank-badge{background:var(--green);color:var(--gold);font-size:11px;font-weight:600;padding:2px 7px;border-radius:20px;flex-shrink:0;font-family:'Playfair Display',serif;}
.score-badge{font-size:13px;font-weight:600;padding:3px 8px;border-radius:20px;flex-shrink:0;font-family:'Playfair Display',serif;background:var(--gold-light);}
.bucket-tag{background:var(--gold-light);color:#92711a;font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;flex-shrink:0;}
.empty-state{text-align:center;padding:3rem 1rem;}
.empty-icon{font-size:40px;color:var(--border);margin-bottom:0.75rem;}
.empty-text{color:var(--text-muted);font-size:14px;line-height:1.6;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--white);border-radius:20px 20px 0 0;width:100%;max-width:430px;max-height:92vh;overflow-y:auto;padding:1.5rem 1.25rem calc(2rem + env(safe-area-inset-bottom));animation:slideUp 0.25s ease;}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:none;opacity:1}}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 1.25rem;}
.modal-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:600;margin-bottom:0.4rem;}
.modal-sub{font-size:13px;color:var(--text-muted);margin-bottom:1.25rem;}
.form-group{margin-bottom:1rem;position:relative;}
.form-label{font-size:12px;font-weight:500;color:var(--text-muted);margin-bottom:4px;display:block;letter-spacing:0.04em;text-transform:uppercase;}
.form-input{width:100%;border:0.5px solid var(--border);border-radius:8px;padding:0.6rem 0.75rem;font-size:16px;font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);outline:none;transition:border-color 0.15s;-webkit-appearance:none;}
.form-input:focus{border-color:var(--green-mid);}
textarea.form-input{resize:none;height:80px;line-height:1.5;}
.suggestions{position:absolute;top:calc(100% + 2px);left:0;right:0;background:var(--white);border:0.5px solid var(--border);border-radius:8px;z-index:400;box-shadow:0 4px 16px rgba(0,0,0,0.12);overflow:hidden;}
.suggestion-item{padding:0.7rem 0.75rem;cursor:pointer;font-size:14px;border-bottom:0.5px solid var(--border);transition:background 0.1s;}
.suggestion-item:last-child{border-bottom:none;}
.suggestion-item:active{background:var(--green-light);}
.suggestion-name{font-weight:500;color:var(--text);}
.suggestion-loc{font-size:12px;color:var(--text-muted);margin-top:1px;}
.suggestion-status{padding:0.65rem 0.75rem;font-size:13px;color:var(--text-muted);font-style:italic;}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite;margin-right:6px;vertical-align:-2px;}
@keyframes spin{to{transform:rotate(360deg)}}
.feeling-btns{display:flex;flex-direction:column;gap:10px;margin-top:0.5rem;}
.feeling-btn{width:100%;padding:1rem 1.25rem;border:0.5px solid var(--border);border-radius:12px;background:var(--white);font-family:'DM Sans',sans-serif;cursor:pointer;text-align:left;display:flex;align-items:center;gap:12px;transition:all 0.15s;}
.feeling-btn:active{transform:scale(0.98);}
.feeling-btn.liked{border-color:#2d5a3d;background:var(--green-light);}
.feeling-btn.okay{border-color:#b8860b;background:#fefbf0;}
.feeling-btn.disliked{border-color:#dc2626;background:#fff5f5;}
.feeling-label{font-size:15px;font-weight:500;}
.feeling-range{font-size:12px;color:var(--text-muted);margin-top:1px;}
.h2h-prompt{font-size:15px;color:var(--text-muted);margin-bottom:1.25rem;line-height:1.5;}
.h2h-btns{display:flex;flex-direction:column;gap:10px;}
.h2h-btn{width:100%;padding:1rem 1.25rem;border:0.5px solid var(--border);border-radius:12px;background:var(--white);font-family:'DM Sans',sans-serif;cursor:pointer;text-align:left;transition:all 0.15s;}
.h2h-btn:active{background:var(--green-light);border-color:var(--green-mid);}
.h2h-course{font-size:15px;font-weight:500;}
.h2h-loc{font-size:12px;color:var(--text-muted);margin-top:2px;}
.h2h-score{font-size:12px;color:var(--gold);font-weight:600;margin-top:2px;}
.h2h-divider{text-align:center;font-size:12px;color:var(--text-muted);font-weight:500;letter-spacing:0.05em;padding:0.25rem 0;}
.progress-dots{display:flex;gap:6px;justify-content:center;margin-bottom:1.25rem;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border);}
.dot.active{background:var(--green);}
.dot.done{background:var(--gold);}
.type-toggle{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:4px;}
.type-btn{padding:0.6rem;border:0.5px solid var(--border);border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;background:var(--white);color:var(--text-muted);font-family:'DM Sans',sans-serif;transition:all 0.15s;}
.type-btn.active{background:var(--green);color:var(--white);border-color:var(--green);}
.save-btn{width:100%;background:var(--green);color:var(--white);border:none;border-radius:10px;padding:0.9rem;font-size:16px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:0.5rem;}
.save-btn:active{background:var(--green-mid);}
.delete-btn{width:100%;background:none;color:var(--danger);border:0.5px solid var(--danger);border-radius:10px;padding:0.75rem;font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:0.5rem;}
.search-wrap{position:relative;margin-bottom:0.75rem;}
.search-input{width:100%;border:0.5px solid var(--border);border-radius:10px;padding:0.6rem 0.75rem 0.6rem 2.25rem;font-size:15px;font-family:'DM Sans',sans-serif;background:var(--white);color:var(--text);outline:none;-webkit-appearance:none;}
.search-icon{position:absolute;left:0.65rem;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:16px;pointer-events:none;}
.step{display:none;}.step.active{display:block;}
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div class="logo">The<span> Bag</span></div>
    <button class="add-btn" onclick="openModal()" aria-label="Add course"><i class="ti ti-plus"></i></button>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('played',this)">Played</button>
    <button class="tab" onclick="switchTab('bucket',this)">Bucket List</button>
  </div>
</div>
<div class="content" id="main-content"></div>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="step active" id="step-1">
      <div class="modal-title" id="modal-title">Add a course</div>
      <div class="form-group">
        <label class="form-label">Course name</label>
        <input class="form-input" id="f-name" placeholder="Start typing a course name…" autocomplete="off" />
        <div class="suggestions" id="suggestions" style="display:none"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Location</label>
        <input class="form-input" id="f-location" placeholder="City, State" />
      </div>
      <div class="form-group">
        <label class="form-label">Type</label>
        <div class="type-toggle">
          <button class="type-btn active" id="btn-played" onclick="setType('played')">Played</button>
          <button class="type-btn" id="btn-bucket" onclick="setType('bucket')">Bucket list</button>
        </div>
      </div>
      <div id="played-extra">
        <div class="form-group">
          <label class="form-label">Date played</label>
          <input class="form-input" id="f-date" type="date" />
        </div>
        <div class="form-group">
          <label class="form-label">Notes</label>
          <textarea class="form-input" id="f-notes" placeholder="Conditions, highlights, would you go back?"></textarea>
        </div>
      </div>
      <button class="save-btn" onclick="step1Next()">Next</button>
      <button class="delete-btn" id="delete-btn" style="display:none" onclick="deleteCourse()"><i class="ti ti-trash"></i> Remove course</button>
    </div>
    <div class="step" id="step-2">
      <div class="modal-title">How was it?</div>
      <div class="modal-sub" id="feeling-sub"></div>
      <div class="feeling-btns">
        <button class="feeling-btn liked" onclick="setFeeling('liked')">
          <div><div class="feeling-label">I loved it</div><div class="feeling-range">Score range: 8–10</div></div>
        </button>
        <button class="feeling-btn okay" onclick="setFeeling('okay')">
          <div><div class="feeling-label">I liked it</div><div class="feeling-range">Score range: 5–7</div></div>
        </button>
        <button class="feeling-btn disliked" onclick="setFeeling('disliked')">
          <div><div class="feeling-label">It was okay / didn't like it</div><div class="feeling-range">Score range: 1–4</div></div>
        </button>
      </div>
    </div>
    <div class="step" id="step-3">
      <div class="modal-title">Compare courses</div>
      <div class="progress-dots" id="progress-dots"></div>
      <div class="h2h-prompt" id="h2h-prompt"></div>
      <div class="h2h-btns" id="h2h-btns"></div>
    </div>
    <div class="step" id="step-edit">
      <div class="modal-title">Edit course</div>
      <div class="form-group">
        <label class="form-label">Course name</label>
        <input class="form-input" id="e-name" />
      </div>
      <div class="form-group">
        <label class="form-label">Location</label>
        <input class="form-input" id="e-location" />
      </div>
      <div class="form-group">
        <label class="form-label">Date played</label>
        <input class="form-input" id="e-date" type="date" />
      </div>
      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea class="form-input" id="e-notes"></textarea>
      </div>
      <button class="save-btn" onclick="saveEdit()">Save changes</button>
      <button class="delete-btn" onclick="deleteCourse()"><i class="ti ti-trash"></i> Remove course</button>
    </div>
  </div>
</div>
<script>
let courses=JSON.parse(localStorage.getItem('thebag_v4')||'[]');
let currentTab='played',editingId=null,currentType='played',searchTimer=null,suggestionResults=[];
let newCourse=null,feelingRange=[],h2hQueue=[],h2hIndex=0,h2hResults=[],maxComparisons=3;

function save(){localStorage.setItem('thebag_v4',JSON.stringify(courses));}
function switchTab(tab,el){currentTab=tab;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');render();}
function formatDate(d){if(!d)return '';return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function scoreColor(s){if(s>=8)return '#2d5a3d';if(s>=5)return '#b8860b';return '#dc2626';}

function render(){
  const el=document.getElementById('main-content');
  const list=courses.filter(c=>c.type===currentTab);
  if(currentTab==='played'){
    const sorted=[...list].sort((a,b)=>b.score-a.score);
    const avg=list.length?(list.reduce((s,c)=>s+c.score,0)/list.length).toFixed(1):0;
    let html=`<div class="stats-row"><div class="stat-card"><div class="stat-num">${list.length}</div><div class="stat-label">Courses</div></div><div class="stat-card"><div class="stat-num">${avg||'—'}</div><div class="stat-label">Avg score</div></div><div class="stat-card"><div class="stat-num">${list.filter(c=>c.score>=8).length}</div><div class="stat-label">8+ scores</div></div></div>`;
    if(sorted.length){
      html+=`<div class="search-wrap"><i class="ti ti-search search-icon" aria-hidden="true"></i><input class="search-input" placeholder="Search courses…" oninput="renderFiltered()" /></div>`;
      html+=`<div class="section-head">Ranked by score</div><div id="course-list">`;
      sorted.forEach((c,i)=>{
        html+=`<div class="course-card" onclick="openEdit('${c.id}')"><div class="course-top"><div><div class="course-name">${c.name}</div><div class="course-location">${c.location||''}</div></div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px"><div class="rank-badge">#${i+1}</div><div class="score-badge" style="color:${scoreColor(c.score)}">${c.score}/10</div></div></div>${c.date?`<div class="course-meta"><i class="ti ti-calendar" style="font-size:12px;vertical-align:-1px"></i> ${formatDate(c.date)}</div>`:''}${c.notes?`<div class="course-notes">${c.notes}</div>`:''}</div>`;
      });
      html+=`</div>`;
    } else {
      html+=`<div class="empty-state"><div class="empty-icon"><i class="ti ti-golf"></i></div><div class="empty-text">No courses logged yet.<br>Hit + to add your first round.</div></div>`;
    }
    el.innerHTML=html;
  } else {
    let html='';
    if(list.length){
      html+=`<div class="search-wrap"><i class="ti ti-search search-icon"></i><input class="search-input" placeholder="Search bucket list…" oninput="renderFiltered()" /></div><div class="section-head">${list.length} course${list.length!==1?'s':''} to play</div><div id="course-list">`;
      list.forEach(c=>{html+=`<div class="course-card" onclick="openEdit('${c.id}')"><div class="course-top"><div><div class="course-name">${c.name}</div><div class="course-location">${c.location||''}</div></div><div class="bucket-tag">Want to play</div></div>${c.notes?`<div class="course-notes" style="margin-top:8px">${c.notes}</div>`:''}</div>`;});
      html+=`</div>`;
    } else {
      html=`<div class="empty-state"><div class="empty-icon"><i class="ti ti-map-pin"></i></div><div class="empty-text">Your bucket list is empty.<br>Start adding dream courses.</div></div>`;
    }
    el.innerHTML=html;
  }
}

function renderFiltered(){const q=(document.querySelector('.search-input')?.value||'').toLowerCase();document.querySelectorAll('#course-list .course-card').forEach(card=>{card.style.display=card.innerText.toLowerCase().includes(q)?'':'none';});}

const nameInput=document.getElementById('f-name');
const sugBox=document.getElementById('suggestions');
nameInput.addEventListener('input',function(){const val=this.value.trim();clearTimeout(searchTimer);if(val.length<2){sugBox.style.display='none';return;}searchTimer=setTimeout(()=>fetchSuggestions(val),420);});

async function fetchSuggestions(query){
  sugBox.style.display='block';
  sugBox.innerHTML=`<div class="suggestion-status"><span class="spinner"></span>Finding courses…</div>`;
  try{
    const res=await fetch('/api/suggest',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query})});
    const data=await res.json();
    suggestionResults=data.results||[];
    if(!suggestionResults.length){sugBox.innerHTML=`<div class="suggestion-status">No matches — type it in manually.</div>`;return;}
    sugBox.innerHTML=suggestionResults.map((r,i)=>`<div class="suggestion-item" onmousedown="selectCourse(${i})" ontouchstart="selectCourse(${i})"><div class="suggestion-name">${r.name}</div><div class="suggestion-loc">${r.city}, ${r.state}</div></div>`).join('');
  }catch(err){sugBox.innerHTML=`<div class="suggestion-status">Couldn't load suggestions — type it manually.</div>`;}
}

function selectCourse(idx){const r=suggestionResults[idx];if(!r)return;nameInput.value=r.name;document.getElementById('f-location').value=`${r.city}, ${r.state}`;sugBox.style.display='none';}
document.addEventListener('click',e=>{if(!e.target.closest('#suggestions')&&e.target!==nameInput)sugBox.style.display='none';});
function showStep(id){document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

function step1Next(){
  const name=nameInput.value.trim();if(!name)return;
  if(currentType==='bucket'){
    const course={id:editingId||Date.now().toString(),name,location:document.getElementById('f-location').value.trim(),type:'bucket',score:0,date:'',notes:document.getElementById('f-notes').value.trim()};
    saveOrUpdate(course);closeModal();currentTab='bucket';
    document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===1));render();return;
  }
  if(editingId){
    const c=courses.find(x=>x.id===editingId);
    document.getElementById('e-name').value=c.name;document.getElementById('e-location').value=c.location||'';
    document.getElementById('e-date').value=c.date||'';document.getElementById('e-notes').value=c.notes||'';
    showStep('step-edit');return;
  }
  newCourse={id:Date.now().toString(),name,location:document.getElementById('f-location').value.trim(),type:'played',score:0,date:document.getElementById('f-date').value,notes:document.getElementById('f-notes').value.trim()};
  document.getElementById('feeling-sub').textContent=newCourse.name;
  showStep('step-2');
}

function setFeeling(feeling){
  if(feeling==='liked')feelingRange=[8,10];
  else if(feeling==='okay')feelingRange=[5,7];
  else feelingRange=[1,4];
  const played=courses.filter(c=>c.type==='played');
  if(played.length<2){newCourse.score=Math.round((feelingRange[0]+feelingRange[1])/2);finalizeCourse();return;}
  const sorted=[...played].sort((a,b)=>b.score-a.score);
  const inRange=sorted.filter(c=>c.score>=feelingRange[0]&&c.score<=feelingRange[1]);
  const above=sorted.filter(c=>c.score>feelingRange[1]);
  const below=sorted.filter(c=>c.score<feelingRange[0]);
  h2hQueue=[];
  if(above.length)h2hQueue.push(above[above.length-1]);
  if(inRange.length)h2hQueue.push(inRange[Math.floor(inRange.length/2)]);
  if(below.length)h2hQueue.push(below[0]);
  if(h2hQueue.length===0)h2hQueue=sorted.slice(0,Math.min(3,sorted.length));
  h2hQueue=h2hQueue.slice(0,maxComparisons);
  h2hIndex=0;h2hResults=[];
  showStep('step-3');showH2H();
}

function showH2H(){
  const total=h2hQueue.length;
  let dots='';for(let i=0;i<total;i++)dots+=`<div class="dot${i<h2hIndex?' done':i===h2hIndex?' active':''}"></div>`;
  document.getElementById('progress-dots').innerHTML=dots;
  if(h2hIndex>=total){computeFinalScore();return;}
  const opponent=h2hQueue[h2hIndex];
  document.getElementById('h2h-prompt').textContent='Which course did you enjoy more?';
  document.getElementById('h2h-btns').innerHTML=`<button class="h2h-btn" onclick="h2hPick('new')"><div class="h2h-course">${newCourse.name}</div><div class="h2h-loc">${newCourse.location||'New course'}</div></button><div class="h2h-divider">VS</div><button class="h2h-btn" onclick="h2hPick('existing')"><div class="h2h-course">${opponent.name}</div><div class="h2h-loc">${opponent.location||''}</div><div class="h2h-score">${opponent.score}/10</div></button>`;
}

function h2hPick(pick){const opponent=h2hQueue[h2hIndex];h2hResults.push({opponent,pickedNew:pick==='new'});h2hIndex++;showH2H();}

function computeFinalScore(){
  let lo=feelingRange[0],hi=feelingRange[1];
  h2hResults.forEach(r=>{
    if(r.pickedNew&&r.opponent.score>=lo)lo=Math.min(hi,r.opponent.score+0.1);
    if(!r.pickedNew&&r.opponent.score<=hi)hi=Math.max(lo,r.opponent.score-0.1);
  });
  const wins=h2hResults.filter(r=>r.pickedNew).length;
  const ratio=h2hResults.length>0?wins/h2hResults.length:0.5;
  newCourse.score=Math.round(Math.min(10,Math.max(1,lo+ratio*(hi-lo)))*10)/10;
  finalizeCourse();
}

function finalizeCourse(){courses.push(newCourse);save();closeModal();currentTab='played';document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===0));render();}
function saveOrUpdate(course){if(editingId){const idx=courses.findIndex(c=>c.id===editingId);if(idx>-1)courses[idx]=course;}else courses.push(course);save();}

function openModal(){
  editingId=null;currentType='played';
  nameInput.value='';document.getElementById('f-location').value='';document.getElementById('f-notes').value='';document.getElementById('f-date').value='';
  sugBox.style.display='none';document.getElementById('delete-btn').style.display='none';
  setType('played');showStep('step-1');document.getElementById('modal').classList.add('open');
}

function openEdit(id){
  const c=courses.find(x=>x.id===id);if(!c)return;
  editingId=id;currentType=c.type;
  document.getElementById('e-name').value=c.name;document.getElementById('e-location').value=c.location||'';
  document.getElementById('e-date').value=c.date||'';document.getElementById('e-notes').value=c.notes||'';
  document.getElementById('delete-btn').style.display='block';
  showStep('step-edit');document.getElementById('modal').classList.add('open');
}

function saveEdit(){
  if(!editingId)return;
  const idx=courses.findIndex(c=>c.id===editingId);
  if(idx>-1){courses[idx].name=document.getElementById('e-name').value.trim();courses[idx].location=document.getElementById('e-location').value.trim();courses[idx].date=document.getElementById('e-date').value;courses[idx].notes=document.getElementById('e-notes').value.trim();}
  save();closeModal();render();
}

function closeModal(){document.getElementById('modal').classList.remove('open');}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
function setType(t){currentType=t;document.getElementById('btn-played').classList.toggle('active',t==='played');document.getElementById('btn-bucket').classList.toggle('active',t==='bucket');document.getElementById('played-extra').style.display=t==='played'?'':'none';}
function deleteCourse(){if(!editingId)return;courses=courses.filter(c=>c.id!==editingId);save();closeModal();render();}

if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js');}
render();
</script>
</body>
</html>
